name: تشغيل بوت RSS

on:
  schedule:
    - cron: '0 */3 * * *'   # كل 6 ساعات
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: تحميل الكود
        uses: actions/checkout@v4
      
      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: تثبيت المكتبات
        run: |
          pip install -r requirements.txt
      
      - name: تشغيل البوت
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TARGET_CHANNEL: ${{ secrets.TARGET_CHANNEL }}
        run: |
          python rss_bot.py
