name: تشغيل البوت

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: تحميل الكود
        uses: actions/checkout@v4
      
      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: تثبيت المكتبات
        run: |
          pip install -r requirements.txt
      
      - name: تشغيل البوت
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          PHONE: ${{ secrets.PHONE }}
          TARGET_CHANNEL: ${{ secrets.TARGET_CHANNEL }}
        run: |
          python bot.py
